<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 에이전트 질문하기</title>
  <style>
    /* 전체 페이지 배경 및 정렬 */
    body {
      margin: 0;
      padding: 20px;
      background-color: #f4f6f8; /* 폼이 돋보이도록 옅은 회색 배경 적용 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* AI 설문 섹션 전체 컨테이너 스타일 */
    .ai-survey-container {
      width: 100%;
      max-width: 600px;
      padding: 40px 30px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
    }
    
    .ai-survey-container h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 10px;
      color: #333;
      font-size: 1.5rem;
    }
    
    .ai-survey-container p {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    /* 폼 요소 스타일 */
    .ai-survey-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .ai-survey-form input,
    .ai-survey-form textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
      background-color: #fff;
    }
    
    .ai-survey-form input:focus,
    .ai-survey-form textarea:focus {
      outline: none;
      border-color: #4A90E2;
      box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
    }
    
    .ai-survey-form textarea {
      min-height: 140px;
      resize: vertical;
    }
    
    /* 전송 버튼 스타일 */
    .ai-survey-form button {
      background-color: #4A90E2;
      color: white;
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      margin-top: 10px;
    }
    
    .ai-survey-form button:hover {
      background-color: #357ABD;
    }
    
    .ai-survey-form button:active {
      transform: translateY(2px);
    }
    
    /* 상태 메시지 스타일 */
    #responseMessage {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
      background: #f8f9fa;
      border: 1px solid #eee;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <section class="ai-survey-container">
    <h2>🤖 AI 에이전트에게 질문하기</h2>
    <p>제 포트폴리오나 프로젝트에 대해 궁금한 점을 남겨주시면,<br>AI가 내용을 분석하여 입력하신 이메일로 즉시 답변을 보내드립니다.</p>

    <form id="contactForm" class="ai-survey-form">
      <input type="text" id="visitorName" placeholder="이름을 입력해주세요" required>
      <input type="email" id="visitorEmail" placeholder="답변을 받으실 이메일 주소" required>
      <textarea id="visitorMessage" placeholder="AI 에이전트에게 할 질문을 자유롭게 입력하세요 (예: 주로 어떤 기술 스택을 선호하시나요?)" required></textarea>
      
      <button type="submit">AI 에이전트에게 질문 전송하기</button>
    </form>

    <!-- 결과 메시지가 표시될 공간 -->
    <div id="responseMessage" style="display:none; margin-top: 20px; font-weight: bold;"></div>
  </section>

  <script>
  document.getElementById('contactForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // 폼 제출 시 페이지 새로고침 방지

    const name = document.getElementById('visitorName').value;
    const email = document.getElementById('visitorEmail').value;
    const message = document.getElementById('visitorMessage').value;
    const responseDiv = document.getElementById('responseMessage');

    // 로딩 상태 표시
    responseDiv.style.display = 'block';
    responseDiv.style.color = '#4A90E2';
    responseDiv.style.borderColor = '#cce5ff';
    responseDiv.style.backgroundColor = '#f8faff';
    responseDiv.innerText = '⏳ AI 에이전트가 질문을 분석 중입니다... 잠시만 기다려주세요.';

    // ⚠️ 중요: Make.com에서 발급받은 실제 Webhook URL로 반드시 교체하세요!
    const makeWebhookUrl = 'https://hook.eu1.make.com/nv6djjlqhw0d7231du31o1383nbet8b1';

    try {
      const response = await fetch(makeWebhookUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          visitor_name: name,
          visitor_email: email,
          visitor_message: message
        })
      });

      if (response.ok) {
        // 성공 상태 표시
        responseDiv.style.color = '#28a745';
        responseDiv.style.borderColor = '#c3e6cb';
        responseDiv.style.backgroundColor = '#f3faf5';
        responseDiv.innerText = '✅ 질문이 성공적으로 접수되었습니다! 입력하신 메일로 AI의 답변이 곧 발송됩니다.';
        document.getElementById('contactForm').reset(); // 폼 초기화
      } else {
        throw new Error('서버 응답 실패');
      }
    } catch (error) {
      // 실패 상태 표시
      responseDiv.style.color = '#dc3545';
      responseDiv.style.borderColor = '#f5c6cb';
      responseDiv.style.backgroundColor = '#fdf3f4';
      responseDiv.innerText = '❌ 접수 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
    }
  });
  </script>

</body>
</html>
